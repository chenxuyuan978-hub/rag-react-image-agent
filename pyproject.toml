[tool.black]
line-length = 88
target-version = ["py310"]

[tool.ruff]
line-length = 88
target-version = "py310"

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "I",   # import sorting
    "B",   # common bug-prone patterns
    "UP",  # modern Python syntax upgrades
    "SIM", # simple code improvements
]
ignore = [
    "E501", # Black handles line wrapping; keeping this avoids duplicate line-length noise.
]

[tool.ruff.lint.per-file-ignores]
"scripts/*.py" = [
    "E402", # Scripts adjust sys.path before importing app modules so they run directly from the repo root.
]
"frontend/streamlit_app.py" = [
    "E402", # Streamlit entry point adjusts sys.path before importing app modules when launched directly.
]

[tool.ruff.lint.isort]
known-first-party = ["app", "scripts"]
